services:
  - type: web
    name: prod-agent-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: RATE_LIMIT
        value: "20/minute"
      - key: CACHE_TTL_SECONDS
        value: "300"
      - key: MAX_RETRIES
        value: "3"
      - key: PRIMARY_MODEL
        value: gemini-3.1-flash-lite
      - key: FALLBACK_MODEL
        value: gemini-3.5-flash
      - key: GOOGLE_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: prod-agent-api
    healthCheckPath: /health
    autoDeploy: true